<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión</title>
  <!-- Conecta el HTML con los estilos definidos para la página de sesión -->
  <link rel="stylesheet" href="../css/stylesSesion.css">
</head>

<body>
  <!-- Encabezado principal de la página -->
  <header>
    <h1>Iniciar sesión</h1>
    <p>Ingresa tus credenciales para continuar.</p>
  </header>

  <main>
    <section id="section-login">
      <div class="login-card">
        <!-- Contenedor visual principal del formulario -->
        <form action="../index.html" method="post">
          <!-- Grupo de campo para el usuario -->
          <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required autocomplete="username">
          </div>

          <!-- Grupo de campo para la contraseña -->
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
          </div>

          <!-- Botón de enviar el formulario -->
          <button type="submit" class="btn-login">Iniciar sesión</button>
        </form>

        <!-- Enlace de navegación para crear una cuenta nueva -->
        <p class="account-text">
          ¿No tienes una cuenta? <a href="CrearSesion.html">Crear una cuenta</a>
        </p>

        <p class="account-text">
          <a href="../index.html">Regresar</a>
        </p>
      </div>
    </section>
  </main>

  <footer>
    <p>Copyright © 2026 Triada. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
