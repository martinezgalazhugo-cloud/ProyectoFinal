<html>
    <header>
    <h1>Configuración de Sesión</h1>
    </header>

    <main>
        <section>
            <div>
                <p>En esta sección, puedes configurar tus preferencias de sesión, como el idioma, la privacidad y las notificaciones.</p>
            </div>
        </section>

        <section>
            <div>
                <h2>Preferencias de Sesión</h2>
                <form action="../index.html" method="post">
                    <label for="language">Idioma:</label>
                    <select id="language" name="language">
                        <option value="es">Español</option>
                        <option value="en">Inglés</option>
                        <option value="it">Italiano</option>
                        <option value="jp">Japonés</option>
                    </select><br><br>

                    <label for="privacy">Privacidad:</label>
                    <select id="privacy" name="privacy">
                        <option value="public">Público</option>
                        <option value="private">Privado</option>
                    </select><br><br>

                    <label for="notifications">Notificaciones:</label>
                    <select id="notifications" name="notifications">
                        <option value="enabled">Habilitadas</option>
                        <option value="disabled">Deshabilitadas</option>
                    </select><br><br>

                    <button type="submit" style="display: block;">Guardar Configuración</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div>
            <a href="/index.html">Volver al menú principal</a>
        </div>
        <div>
        <p>Copyright © 2026 Triada. Todos los derechos reservados.</p>
        </div>
    </footer>
</html>
